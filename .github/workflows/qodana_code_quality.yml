#-------------------------------------------------------------------------------#
#        Discover additional configuration options in our documentation         #
#               https://www.jetbrains.com/help/qodana/github.html               #
#-------------------------------------------------------------------------------#
# Nota: usa jetbrains/qodana-jvm-community (linter gratuito, sin token).
# Para análisis Android completo (linter de pago) añade QODANA_TOKEN como secret
# del repositorio y cambia el linter en qodana.yaml.

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        env:
          # Solo necesario con linters de pago (qodana-android, qodana-jvm).
          # Con qodana-jvm-community esta variable puede estar vacía.
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: --baseline,qodana.sarif.json
          # Cuando pr-mode=true, Qodana analiza solo los ficheros modificados
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          # Subir resultados (SARIF, artefactos, logs) como artefacto del job
          upload-result: false
          # quick-fixes disponibles solo en planes Ultimate y Ultimate Plus
          push-fixes: 'none'